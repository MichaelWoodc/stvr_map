<!DOCTYPE html>
<html>
<head>
  <title>Chatham County STVR Compliance Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    body {
      background-color: #1e1e1e;
      color: white;
      margin: 0;
      font-family: Arial, sans-serif;
    }
    h2 {
      padding: 10px;
      text-align: center;
      background-color: #222;
      margin: 0;
      color: #fff;
    }
    #map {
      height: calc(100vh - 44px);
      width: 100%;
    }

    .filter-panel {
      position: absolute;
      top: 65px;
      left: 2px;
      background: white;
      color: #333;
      padding: 12px;
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
      width: 260px;
      max-height: calc(100vh - 90px);
      overflow-y: auto;
      transition: max-height 0.25s ease, transform 0.25s ease;
    }

    .filter-panel.collapsed {
      max-height: 46px;
      overflow: hidden;
    }

    @media (max-width: 768px) {
      .filter-panel {
        position: fixed;
        left: 0;
        right: 0;
        bottom: 0;
        top: auto;
        width: 100%;
        max-height: 72vh;
        border-radius: 14px 14px 0 0;
        margin: 0;
        box-shadow: 0 -10px 32px rgba(0,0,0,0.3);
      }
      .filter-header {
        flex-wrap: wrap;
        gap: 8px;
      }
      .filter-title {
        flex: 1 1 100%;
      }
      .filter-section-title {
        margin-top: 10px;
      }
      .toggle-button {
        width: 100%;
        font-size: 14px;
        padding: 10px 14px;
        border-radius: 8px;
      }
      .filter-panel.collapsed {
        max-height: 56px;
      }
    }

    .filter-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
    }

    .filter-title {
      font-weight: bold;
    }

    .filter-section-title {
      font-size: 12px;
      margin: 12px 0 6px;
      color: #555;
      text-transform: uppercase;
      letter-spacing: 0.04em;
    }

    .toggle-button {
      background: #eee;
      border: 1px solid #ccc;
      border-radius: 4px;
      padding: 6px 10px;
      font-size: 13px;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .toggle-button:hover {
      background: #ddd;
    }

    .filter-item {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .filter-item input {
      margin-right: 8px;
      transform: scale(1.2);
      cursor: pointer;
    }

    .slider-label {
      font-weight: bold;
      margin-top: 10px;
      margin-bottom: 4px;
    }

    .reset-button {
      margin-top: 12px;
      width: 100%;
      padding: 8px;
      background: #1976d2;
      color: white;
      border: none;
      border-radius: 4px;
      font-weight: bold;
      cursor: pointer;
      text-align: center;
    }

    .reset-button:hover {
      background: #0d47a1;
    }

    .popup-title {
      font-size: 14px;
      font-weight: bold;
      color: #000;
      margin-bottom: 4px;
    }

    .popup-content {
      color: #000;
      font-size: 13px;
    }

    .warning-text {
      color: #d32f2f;
      font-weight: bold;
      background: #ffebee;
      padding: 4px 6px;
      border-radius: 4px;
      margin: 4px 0;
      display: inline-block;
    }

    .airbnb-link {
      display: block;
      margin-top: 10px;
      padding: 6px 12px;
      background-color: #ff5a5f;
      color: white !important;
      text-decoration: none !important;
      border-radius: 4px;
      font-weight: bold;
      text-align: center;
    }

    .action-link {
      display: inline-block;
      margin-top: 8px;
      margin-right: 8px;
      padding: 8px 12px;
      background-color: #1976d2;
      color: white !important;
      text-decoration: none !important;
      border-radius: 4px;
      font-weight: bold;
      text-align: center;
    }

    .action-link.secondary {
      background-color: #555;
    }

    .mobile-popup-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 16px;
    }
    .mobile-popup-overlay.active {
      display: flex;
    }
    .mobile-popup-card {
      width: 100%;
      max-width: 540px;
      max-height: 94vh;
      overflow: hidden;
      background: #fff;
      border-radius: 14px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.35);
      padding: 18px;
      position: relative;
    }
    .mobile-popup-card .close-button {
      position: absolute;
      right: 14px;
      top: 14px;
      border: none;
      background: rgba(255,255,255,0.95);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: 24px;
      line-height: 1;
      cursor: pointer;
      color: #333;
      box-shadow: 0 2px 12px rgba(0,0,0,0.12);
    }
    .mobile-popup-card .count-badge {
      display: inline-block;
      margin-top: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      background: #1976d2;
      color: #fff;
      font-size: 12px;
      font-weight: bold;
    }

    @media (max-width: 768px) {
      .mobile-popup-card {
        width: calc(100% - 32px);
        max-width: 100%;
        max-height: 85vh;
        height: auto;
        border-radius: 16px;
        padding: 18px 16px 22px;
        margin: 0;
        overflow: auto;
      }
      .mobile-popup-overlay {
        align-items: center;
        padding: 16px;
      }
      .mobile-popup-card .close-button {
        right: 12px;
        top: 12px;
        width: 44px;
        height: 44px;
        font-size: 26px;
      }
    }

    .filter-search {
      width: 100%;
      margin-top: 6px;
      margin-bottom: 10px;
      padding: 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <h2>Chatham County STVR Compliance Map</h2>
  <div id="map"></div>
  <div id="mobilePopupOverlay" class="mobile-popup-overlay" role="dialog" aria-modal="true">
    <div class="mobile-popup-card">
      <button class="close-button" id="mobilePopupClose">×</button>
      <div id="mobilePopupContent"></div>
    </div>
  </div>

  <div class="filter-panel" id="filterPanel">
    <div class="filter-header">
      <div class="filter-title">Filters</div>
      <button class="toggle-button" id="toggleFiltersBtn">Hide</button>
    </div>

    <div class="filter-section-title">Compliance</div>
    <label class="filter-item">
      <input type="checkbox" id="complianceCheckbox">
      Show Violations Only
    </label>
    <label class="filter-item">
      <input type="checkbox" id="verifiedLicenseCheckbox">
      Verified license found
    </label>
    <label class="filter-item">
      <input type="checkbox" id="hasComplaintsCheckbox">
      Has complaints
    </label>

    <div class="filter-section-title">Search</div>
    <input id="propertySearchInput" class="filter-search" type="search" placeholder="Host name, license number, address">

    <div class="filter-section-title">Municipalities</div>
    <div id="totalCount" style="font-weight:bold;margin-bottom:6px">Total: 0</div>
    <div id="municipalityCheckboxes"></div>

    <div class="slider-label">Min Over-Limit:</div>
    <input type="range" id="overLimitSlider" min="0" max="6" value="0" step="1" style="width:100%;">
    <div id="overLimitValue">0 guests over</div>

    <div class="slider-label">Min License Count:</div>
    <input type="range" id="licenseCountSlider" min="1" max="3" value="1" step="1" style="width:100%;">
    <div id="licenseCountValue">1 or more</div>

    <button class="reset-button" id="resetZoomBtn">Reset Zoom</button>
  </div>

  <script src="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.js"></script>
  <script src="locations.js"></script>

  <script>
    // Precompute metrics
    const processedLocations = locations.map(loc => {
      const latitude = Number(loc.latitude);
      const longitude = Number(loc.longitude);
      const guests = Number(loc.guests) || 0;
      const bedrooms = Number(loc.bedrooms) || 0;
      const allowedGuests = Number(loc.allowed_guests);
      const overOccupancy = Number(loc.over_occupancy);

      let verifiedLicenseItems = [];
      if (loc.verified_licenses) {
        if (typeof loc.verified_licenses === "string") {
          try {
            verifiedLicenseItems = JSON.parse(loc.verified_licenses);
          } catch (err) {
            verifiedLicenseItems = [];
          }
        } else if (Array.isArray(loc.verified_licenses)) {
          verifiedLicenseItems = loc.verified_licenses;
        }
      }

      if (!latitude || !longitude) return null;

      const fallbackAllowedGuests = bedrooms === 0 ? 2 : (bedrooms * 2) + 2;
      const maxAllowedGuests = Number.isFinite(allowedGuests) ? allowedGuests : fallbackAllowedGuests;
      const computedOverAmount = Number.isFinite(overOccupancy) ? overOccupancy : Math.max(0, guests - maxAllowedGuests);
      const isOverCapacity = computedOverAmount > 0;
      const overAmount = isOverCapacity ? computedOverAmount : 0;

      const hasVerifiedLicense = Array.isArray(verifiedLicenseItems) && verifiedLicenseItems.length > 0;
      const licenseCount = Array.isArray(verifiedLicenseItems) ? verifiedLicenseItems.length : 0;
      const searchText = [
        loc.host_name,
        loc.municipality,
        loc.approximate_address,
        loc.rental_type,
        loc.url,
        verifiedLicenseItems.map(v => (v && v.permit_number) || "").join(" "),
        verifiedLicenseItems.map(v => (v && v.agent_name) || "").join(" ")
      ].filter(Boolean).join(" ").toLowerCase();

      const complaintAddress = verifiedLicenseItems.length > 0 && verifiedLicenseItems[0].address
        ? `${verifiedLicenseItems[0].address}${verifiedLicenseItems[0].unit ? ' Unit ' + verifiedLicenseItems[0].unit : ''}`.trim()
        : (loc.approximate_address || loc.address || '');

      const complaintKeyCandidates = [
        normalizePropertyKey(complaintAddress, loc.unit || '', loc.municipality || ''),
        normalizePropertyKey(loc.approximate_address || loc.address || '', loc.unit || '', loc.municipality || '')
      ];

      return {
        ...loc,
        latitude,
        longitude,
        guests,
        bedrooms,
        maxAllowedGuests,
        allowedGuests: maxAllowedGuests,
        overOccupancy: computedOverAmount,
        isOverCapacity,
        overAmount,
        hasVerifiedLicense,
        licenseCount,
        verifiedLicenseItems,
        searchText,
        complaintKeys: complaintKeyCandidates,
        hasComplaints: false
      };
    }).filter(Boolean);

    function normalizePropertyKey(address, unit, municipality) {
      const raw = [address, unit, municipality].filter(Boolean).map(v => String(v).trim()).join(' | ');
      return raw.toLowerCase()
        .replace(/[^a-z0-9\s\-_\.]/g, '-')
        .replace(/[\s_]+/g, '-')
        .replace(/^-+|-+$/g, '') || 'unknown-property';
    }

    function openMobilePopup(html) {
      const overlay = document.getElementById('mobilePopupOverlay');
      const content = document.getElementById('mobilePopupContent');
      if (!overlay || !content) return;
      content.innerHTML = html;
      overlay.classList.add('active');
    }

    function closeMobilePopup() {
      const overlay = document.getElementById('mobilePopupOverlay');
      const content = document.getElementById('mobilePopupContent');
      if (!overlay || !content) return;
      overlay.classList.remove('active');
      content.innerHTML = '';
    }

    async function loadComplaintIndex() {
      try {
        const response = await fetch('complaints_index.php');
        if (!response.ok) return;
        const complaintCounts = await response.json();
        processedLocations.forEach(loc => {
          let count = 0;
          loc.complaintKeys.forEach(key => {
            if (complaintCounts[key]) {
              count = Math.max(count, Number(complaintCounts[key]));
            }
          });
          loc.complaintCount = count;
          loc.hasComplaints = count > 0;
        });
        applyFilters();
      } catch (err) {
        console.warn('Could not load complaint index', err);
      }
    }

    function toGeoJSON(data) {
      return {
        type: "FeatureCollection",
        features: data.map(loc => ({
          type: "Feature",
          geometry: {
            type: "Point",
            coordinates: [loc.longitude, loc.latitude]
          },
          properties: loc
        }))
      };
    }

    const defaultCenter = [-81.0087, 32.0485];
    const defaultZoom = 12;
    const municipalityGeojsonUrl = "Municipality.geojson";
    let municipalityNames = [];
    const municipalityColors = {};
    const activeMunicipalities = new Set();

    // Global bounds for reset zoom
    let globalMinX = Infinity, globalMinY = Infinity, globalMaxX = -Infinity, globalMaxY = -Infinity;
    processedLocations.forEach(loc => {
      if (loc.longitude < globalMinX) globalMinX = loc.longitude;
      if (loc.latitude < globalMinY) globalMinY = loc.latitude;
      if (loc.longitude > globalMaxX) globalMaxX = loc.longitude;
      if (loc.latitude > globalMaxY) globalMaxY = loc.latitude;
    });

    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        glyphs: "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",
        sources: {
          "osm": {
            type: "raster",
            tiles: [
              "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
            ],
            tileSize: 256
          }
        },
        layers: [
          {
            id: "osm",
            type: "raster",
            source: "osm"
          }
        ]
      },
      center: defaultCenter,
      zoom: defaultZoom
    });

    // Smooth animation helper
    function animateMap(targetCenter, targetZoom, duration = 900) {
      const startZoom = map.getZoom();
      const startCenter = map.getCenter();
      const startTime = performance.now();

      function frame(now) {
        const t = Math.min((now - startTime) / duration, 1);
        const eased = t * (2 - t);

        const lng = startCenter.lng + (targetCenter[0] - startCenter.lng) * eased;
        const lat = startCenter.lat + (targetCenter[1] - startCenter.lat) * eased;
        const zoom = startZoom + (targetZoom - startZoom) * eased;

        map.jumpTo({ center: [lng, lat], zoom });

        if (t < 1) requestAnimationFrame(frame);
      }

      requestAnimationFrame(frame);
    }

    // Spiderfy helpers
    const SPIDERFY_RADIUS = 7; // px
    function clearSpiderfy() {
      const src = map.getSource("spiderfy");
      if (src) {
        src.setData({ type: "FeatureCollection", features: [] });
      }
    }

    function spiderfyFeatures(features, centerPoint) {
      if (!features || features.length < 2) return;

      const angleStep = (2 * Math.PI) / features.length;
      const spiderFeatures = features.map((f, i) => {
        const angle = i * angleStep;
        const x = centerPoint.x + SPIDERFY_RADIUS * Math.cos(angle);
        const y = centerPoint.y + SPIDERFY_RADIUS * Math.sin(angle);
        const lngLat = map.unproject({ x, y });

        return {
          type: "Feature",
          geometry: {
            type: "Point",
            coordinates: [lngLat.lng, lngLat.lat]
          },
          properties: f.properties
        };
      });

      map.getSource("spiderfy").setData({
        type: "FeatureCollection",
        features: spiderFeatures
      });
    }

    function normalizeMunicipalityName(name) {
      return String(name || "").trim().toUpperCase();
    }

    function getMunicipalityColor(name) {
      const normalized = normalizeMunicipalityName(name);
      if (!normalized) return "#888";
      if (normalized === "TYBEE ISLAND") return "#ff9800";
      if (normalized === "THUNDERBOLT") return "#1976d2";
      if (normalized === "UNINCORPORATED") return "#888888";

      const hash = normalized.split("").reduce((acc, char) => acc + char.charCodeAt(0), 0);
      const hue = hash % 360;
      return `hsl(${hue}, 70%, 55%)`;
    }

    function updateMunicipalityCheckboxes(names) {
      const container = document.getElementById("municipalityCheckboxes");
      container.innerHTML = "";
      activeMunicipalities.clear();

      // Compute counts from processedLocations
      const counts = processedLocations.reduce((acc, loc) => {
        const key = normalizeMunicipalityName(loc.municipality) || "UNINCORPORATED";
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});

      names.forEach(name => {
        const label = document.createElement("label");
        label.className = "filter-item";

        const checkbox = document.createElement("input");
        checkbox.type = "checkbox";
        checkbox.value = name;
        checkbox.checked = true;
        checkbox.addEventListener("change", () => {
          if (checkbox.checked) activeMunicipalities.add(name);
          else activeMunicipalities.delete(name);
          applyFilters();
        });

        const colorSwatch = document.createElement("span");
        colorSwatch.style.display = "inline-block";
        colorSwatch.style.width = "12px";
        colorSwatch.style.height = "12px";
        colorSwatch.style.marginRight = "8px";
        colorSwatch.style.borderRadius = "2px";
        colorSwatch.style.backgroundColor = municipalityColors[name];

        const count = counts[normalizeMunicipalityName(name)] || 0;
        const nameNode = document.createTextNode(name);
        const countSpan = document.createElement("span");
        countSpan.className = "mun-count";
        countSpan.style.marginLeft = "6px";
        countSpan.textContent = ` (${count})`;

        label.appendChild(checkbox);
        label.appendChild(colorSwatch);
        label.appendChild(nameNode);
        label.appendChild(countSpan);
        container.appendChild(label);

        activeMunicipalities.add(name);
      });
    }

    function updateMunicipalityCounts(filtered) {
      // For checkbox counts we want them to reflect the current
      // compliance and slider filters only (not municipality selections).
      // Use the same effectiveMin logic as applyFilters so behavior matches.
      const showViolationsOnly = document.getElementById("complianceCheckbox").checked;
      const verifiedOnly = document.getElementById("verifiedLicenseCheckbox").checked;
      const hasComplaintsOnly = document.getElementById("hasComplaintsCheckbox").checked;
      const minOver = Number(document.getElementById("overLimitSlider").value) || 0;
      const minLicenseCount = Number(document.getElementById("licenseCountSlider").value) || 1;
      const searchTerm = document.getElementById("propertySearchInput").value.trim().toLowerCase();

      let effectiveMin = null;
      if (showViolationsOnly) {
        effectiveMin = Math.max(1, minOver);
      } else if (minOver > 0) {
        effectiveMin = minOver;
      } else {
        effectiveMin = null; // no over-occupancy filter
      }

      const base = processedLocations.filter(loc => {
        if (!loc) return false;
        if (effectiveMin !== null) {
          const overVal = Number(loc.overOccupancy || 0);
          if (overVal < effectiveMin) return false;
        }
        if (minLicenseCount > 1 && Number(loc.licenseCount || 0) < minLicenseCount) return false;
        if (verifiedOnly && !loc.hasVerifiedLicense) return false;
        if (searchTerm && !loc.searchText.includes(searchTerm)) return false;
        return true;
      });

      const counts = base.reduce((acc, loc) => {
        const key = normalizeMunicipalityName(loc.municipality) || "UNINCORPORATED";
        acc[key] = (acc[key] || 0) + 1;
        return acc;
      }, {});

      // Update total count display: show matching / grand total
      const totalEl = document.getElementById('totalCount');
      if (totalEl) totalEl.textContent = `Total: ${base.length} / ${processedLocations.length}`;

      const container = document.getElementById("municipalityCheckboxes");
      const labels = container.querySelectorAll(".filter-item");
      labels.forEach(label => {
        const checkbox = label.querySelector("input[type='checkbox']");
        if (!checkbox) return;
        const name = checkbox.value;
        const countSpan = label.querySelector('.mun-count');
        const c = counts[normalizeMunicipalityName(name)] || 0;
        if (countSpan) countSpan.textContent = ` (${c})`;
      });
    }

    function assignMunicipalities(municipalityGeojson) {
      const polygonFeatures = municipalityGeojson.features.map(feature => ({
        name: normalizeMunicipalityName(feature.properties.NAME),
        polygon: feature
      }));

      processedLocations.forEach(loc => {
        const lon = loc.longitude;
        const lat = loc.latitude;
        loc.municipality = "UNINCORPORATED";

        for (const poly of polygonFeatures) {
          const coordinates = poly.polygon.geometry.coordinates;
          const inside = poly.polygon.geometry.type === "Polygon"
            ? pointInPolygon([lon, lat], coordinates[0])
            : coordinates.some(polygon => polygon.some(ring => pointInPolygon([lon, lat], ring)));

          if (inside) {
            loc.municipality = poly.name;
            loc.municipalityColor = municipalityColors[poly.name] || "#000";
            break;
          }
        }
      });
    }

    function pointInPolygon(point, vs) {
      const x = point[0];
      const y = point[1];
      let inside = false;
      for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
        const xi = vs[i][0], yi = vs[i][1];
        const xj = vs[j][0], yj = vs[j][1];
        const intersect = ((yi > y) !== (yj > y)) &&
          (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
        if (intersect) inside = !inside;
      }
      return inside;
    }

    map.on("load", () => {
      // Main source with clustering
      map.addSource("strv", {
        type: "geojson",
        data: toGeoJSON(processedLocations),
        cluster: true,
        clusterRadius: 40,
        clusterMaxZoom: 14
      });

      // Spiderfy source
      map.addSource("spiderfy", {
        type: "geojson",
        data: { type: "FeatureCollection", features: [] }
      });

      // Municipality boundaries
      fetch(municipalityGeojsonUrl)
        .then(response => response.json())
        .then(data => {
          data.features.forEach(feature => {
            const name = normalizeMunicipalityName(feature.properties.NAME);
            const color = getMunicipalityColor(name);
            municipalityColors[name] = color;
            feature.properties._fillColor = color;
            feature.properties._lineColor = color;
            municipalityNames.push(name);
          });

          municipalityNames.sort();
          updateMunicipalityCheckboxes(municipalityNames);
          assignMunicipalities(data);
          // Initialize counts (matching / grand total) on load
          updateMunicipalityCounts(processedLocations);

          map.addSource("municipalities", {
            type: "geojson",
            data
          });

          const insertBefore = map.getLayer("clusters") ? "clusters" : undefined;

          map.addLayer({
            id: "municipality-fill",
            type: "fill",
            source: "municipalities",
            paint: {
              "fill-color": ["get", "_fillColor"],
              "fill-opacity": 0.48,
              "fill-antialias": true
            },
            layout: {
              visibility: "visible"
            }
          }, insertBefore);

          map.addLayer({
            id: "municipality-outline",
            type: "line",
            source: "municipalities",
            paint: {
              "line-color": ["get", "_lineColor"],
              "line-width": 3,
              "line-opacity": 0.9,
              "line-join": "round",
              "line-cap": "round"
            },
            layout: {
              visibility: "visible"
            }
          }, insertBefore);
        })
        .catch(error => console.error("Failed to load municipality GeoJSON:", error));

      // Cluster circles
      map.addLayer({
        id: "clusters",
        type: "circle",
        source: "strv",
        filter: ["has", "point_count"],
        paint: {
          "circle-color": "#444",
          "circle-radius": [
            "step",
            ["get", "point_count"],
            18, 10,
            22, 25,
            28
          ]
        }
      });

      // Cluster count labels
      map.addLayer({
        id: "cluster-count",
        type: "symbol",
        source: "strv",
        filter: ["has", "point_count"],
        layout: {
          "text-field": "{point_count}",
          "text-size": 12,
          "text-font": ["Noto Sans Regular"]
        },
        paint: {
          "text-color": "#fff"
        }
      });

      // Individual STVR circles
      map.addLayer({
        id: "strv-circles",
        type: "circle",
        source: "strv",
        filter: ["!", ["has", "point_count"]],
        paint: {
          "circle-radius": 12,
          "circle-color": [
            "case",
            ["get", "isOverCapacity"],
            "#d32f2f",
            "#388e3c"
          ],
          "circle-stroke-width": 2,
          "circle-stroke-color": [
            "coalesce",
            ["get", "municipalityColor"],
            "#000"
          ]
        }
      });

      // Labels for individual STVRs
      map.addLayer({
        id: "strv-labels",
        type: "symbol",
        source: "strv",
        filter: ["!", ["has", "point_count"]],
        layout: {
          "text-field": [
            "case",
            ["get", "isOverCapacity"],
            ["to-string", ["get", "overAmount"]],
            ""
          ],
          "text-size": 12,
          "text-font": ["Noto Sans Regular"],
          "text-anchor": "center",
          "text-justify": "center",
          "text-allow-overlap": false,
          "text-ignore-placement": false
        },
        paint: {
          "text-color": "#000",
          "text-halo-color": "#fff",
          "text-halo-width": 0.8
        }
      });

      // Spiderfy circles
      map.addLayer({
        id: "spiderfy-circles",
        type: "circle",
        source: "spiderfy",
        paint: {
          "circle-radius": 10,
          "circle-color": [
            "case",
            ["get", "isOverCapacity"],
            "#d32f2f",
            "#388e3c"
          ],
          "circle-stroke-width": 2,
          "circle-stroke-color": "#000"
        }
      });

      // Spiderfy labels
      map.addLayer({
        id: "spiderfy-labels",
        type: "symbol",
        source: "spiderfy",
        layout: {
          "text-field": [
            "case",
            ["get", "isOverCapacity"],
            ["to-string", ["get", "overAmount"]],
            ""
          ],
          "text-size": 11,
          "text-font": ["Noto Sans Regular"],
          "text-anchor": "center",
          "text-justify": "center",
          "text-allow-overlap": false,
          "text-ignore-placement": false
        },
        paint: {
          "text-color": "#000",
          "text-halo-color": "#fff",
          "text-halo-width": 0.8
        }
      });

// Popup + zoom for individual points (base layer)
      map.on("click", "strv-circles", (e) => {
        clearSpiderfy();

        const loc = e.features[0].properties;
        const excessive = loc.over_occupancy;
        const warning = excessive > 0
          ? `<div class="warning-text">⚠️ OVER CAPACITY BY ${excessive} GUESTS</div>`
          : "";

        // Parse verified licenses if available
        let verifiedLicenses = [];
        let fullVerifiedAddress = "";
        try {
          if (loc.verified_licenses) {
            if (typeof loc.verified_licenses === "string") {
              verifiedLicenses = JSON.parse(loc.verified_licenses);
            } else if (Array.isArray(loc.verified_licenses)) {
              verifiedLicenses = loc.verified_licenses;
            }
          }
        } catch (err) {
          console.error("Error parsing verified_licenses:", err);
        }

        // Build HTML for verified license details and address handling
        let licenseHtml = "";
        let addressHtml = "";

        if (verifiedLicenses.length > 0) {
          const v = verifiedLicenses[0];
          // Construct full verified address including street and unit if present
          fullVerifiedAddress = `${v.address || ''}${v.unit ? ' Unit ' + v.unit : ''}`.trim();
          
          if (fullVerifiedAddress) {
            addressHtml = `<strong>Address:</strong> ${fullVerifiedAddress}<br/>`;
          }

          licenseHtml = `
            <div class="verified-section" style="margin-top: 8px; padding-top: 6px; border-top: 1px dashed #ccc;">
              <strong>✅ Verified License:</strong> ${v.permit_number}<br/>
              <strong>Owner Occupied:</strong> ${v.owner_occupied || 'N/A'}<br/>
              <strong>Historic District:</strong> ${v.historic_district || 'N/A'}<br/>
              <strong>Agent Name:</strong> ${v.agent_name || 'N/A'}
            </div>
          `;
        }

        // Fall back to approx address only if there's no verified address available
        if (!addressHtml && loc.approximate_address) {
          addressHtml = `<strong>Approx Address:</strong> ${loc.approximate_address}<br/>`;
        }

        const complaintAddress = fullVerifiedAddress || loc.approximate_address || '';
        const complaintIntroUrl = `complaint_intro.html?address=${encodeURIComponent(complaintAddress)}&unit=${encodeURIComponent(loc.unit || '')}&municipality=${encodeURIComponent(loc.municipality || '')}&host_name=${encodeURIComponent(loc.host_name || '')}&url=${encodeURIComponent(loc.url || '')}&rental_type=${encodeURIComponent(loc.rental_type || '')}`;
        const complaintViewUrl = `complaints.php?address=${encodeURIComponent(complaintAddress)}&unit=${encodeURIComponent(loc.unit || '')}&municipality=${encodeURIComponent(loc.municipality || '')}`;

        const countBadge = loc.complaintCount > 0 ? `<span class="count-badge">${loc.complaintCount} complaint${loc.complaintCount === 1 ? '' : 's'}</span>` : '';
        const html = `
          <div class="popup-content">
            <div class="popup-title">${loc.rental_type || 'Listing'}</div>
            ${countBadge}
            ${addressHtml}
            <strong>Host:</strong> ${loc.host_name || 'N/A'}<br/>
            ${loc.years_hosting ? `<small>(${loc.years_hosting} years hosting)</small><br/>` : ''}
            <hr/>
            <strong>Advertised Capacity:</strong> ${loc.guests || 'N/A'}<br/>
            <strong>Bedrooms: </strong>${loc.bedrooms || 'N/A'}<br/>
            <strong>Legal Limit:</strong> ${loc.allowed_guests || 'N/A'}<br/>
            ${warning}
            ${licenseHtml}
            <hr/>
            <a class="airbnb-link" href="${loc.url}" target="_blank">View Listing</a>
            <a class="action-link" href="${complaintIntroUrl}" target="_blank">Submit a complaint</a>
            <a class="action-link secondary" href="${complaintViewUrl}" target="_blank">View complaints</a>
          </div>
        `;

        if (window.innerWidth <= 768) {
          openMobilePopup(html);
        } else {
          new maplibregl.Popup({ closeButton: true, closeOnClick: false, maxWidth: '320px' })
            .setLngLat(e.lngLat)
            .setHTML(html)
            .addTo(map);
        }



        const clickedCoord = e.features[0].geometry.coordinates;
        const rendered = map.queryRenderedFeatures(e.point, { layers: ["strv-circles"] });

        const sameSpot = rendered.filter(f => {
          const c = f.geometry.coordinates;
          return c[0] === clickedCoord[0] && c[1] === clickedCoord[1];
        });

        const zoom = map.getZoom();
        const shouldSpiderfy =
          sameSpot.length > 1 ||
          (zoom >= 18 && rendered.length > 1);

        if (shouldSpiderfy) {
          const centerPoint = map.project(e.lngLat);
          spiderfyFeatures(sameSpot, centerPoint);
        } else {
          animateMap(clickedCoord, Math.max(zoom, 15));
        }
      });

      // Popup + zoom for spiderfied points
      map.on("click", "spiderfy-circles", (e) => {
        const loc = e.features[0].properties;
        const excessive = loc.overOccupancy;
        const warning = excessive > 0
          ? `<div class="warning-text">${excessive} GUESTS OVER LIMIT</div>`
          : "";

        const complaintIntroUrl = `complaint_intro.html?address=${encodeURIComponent(loc.approximate_address || '')}&unit=${encodeURIComponent(loc.unit || '')}&municipality=${encodeURIComponent(loc.municipality || '')}&host_name=${encodeURIComponent(loc.host_name || '')}&url=${encodeURIComponent(loc.url || '')}&rental_type=${encodeURIComponent(loc.rental_type || '')}`;
        const complaintViewUrl = `complaints.php?address=${encodeURIComponent(loc.approximate_address || '')}&unit=${encodeURIComponent(loc.unit || '')}&municipality=${encodeURIComponent(loc.municipality || '')}`;

        const complaintBadge = loc.complaintCount > 0 ? `<span class="count-badge">${loc.complaintCount} complaint${loc.complaintCount === 1 ? '' : 's'}</span>` : '';
        const html = `
          <div class="popup-content">
            <div class="popup-title">${loc.rental_type}</div>
            ${complaintBadge}
            <strong>Approx Address:</strong> ${loc.approximate_address}<br/>
            <strong>Host:</strong> ${loc.host_name}<hr/>
            <strong>Advertised Capacity:</strong> ${loc.guests}<br/>
            <strong>Bedrooms:</strong> ${loc.bedrooms}<br/>
            <strong>Legal Limit:</strong> ${loc.allowedGuests}<br/>
            ${warning}
            <a class="airbnb-link" href="${loc.url}" target="_blank">View Listing</a>
            <a class="action-link" href="${complaintIntroUrl}" target="_blank">Submit a complaint</a>
            <a class="action-link secondary" href="${complaintViewUrl}" target="_blank">View complaints</a>
          </div>
        `;

        if (window.innerWidth <= 768) {
          openMobilePopup(html);
        } else {
          new maplibregl.Popup({ closeButton: true, closeOnClick: false, maxWidth: '320px' })
            .setLngLat(e.lngLat)
            .setHTML(html)
            .addTo(map);
        }
      });

      // Cluster click: zoom into cluster (no spiderfy unless max zoom & overlap handled via point clicks)
      map.on("click", "clusters", (e) => {
        clearSpiderfy();

        const clusterId = e.features[0].properties.cluster_id;
        const source = map.getSource("strv");

        source.getClusterLeaves(clusterId, Infinity, 0, (err, leaves) => {
          if (err || !leaves.length) return;

          let minX = Infinity, minY = Infinity, maxX = -Infinity, maxY = -Infinity;

          leaves.forEach(f => {
            const [x, y] = f.geometry.coordinates;
            if (x < minX) minX = x;
            if (y < minY) minY = y;
            if (x > maxX) maxX = x;
            if (y > maxY) maxY = y;
          });

          const center = [(minX + maxX) / 2, (minY + maxY) / 2];
          const dx = maxX - minX;
          const dy = maxY - minY;
          const size = Math.max(dx, dy);
          const zoom = Math.min(18, map.getZoom() + (size < 0.01 ? 3 : 2));

          animateMap(center, zoom);
        });
      });

    });

    // Filtering logic
    function applyFilters() {
      const showViolationsOnly = document.getElementById("complianceCheckbox").checked;
      const verifiedOnly = document.getElementById("verifiedLicenseCheckbox").checked;
      const hasComplaintsOnly = document.getElementById("hasComplaintsCheckbox").checked;
      const minOver = Number(document.getElementById("overLimitSlider").value);
      const minLicenseCount = Number(document.getElementById("licenseCountSlider").value) || 1;
      const searchTerm = document.getElementById("propertySearchInput").value.trim().toLowerCase();
      const selectedMunicipalities = Array.from(activeMunicipalities.values());

      // Effective minimum over-occupancy logic:
      // - If "Show Violations Only" is checked, require at least 1 guest over (minimum 1).
      // - If not checked and slider is 0, do not filter by over-occupancy (show all listings).
      // - If not checked and slider > 0, apply the slider threshold.
      let effectiveMin = null;
      if (showViolationsOnly) {
        effectiveMin = Math.max(1, minOver);
      } else if (minOver > 0) {
        effectiveMin = minOver;
      } else {
        effectiveMin = null; // no over-occupancy filter
      }

      const filtered = processedLocations.filter(loc => {
        if (!selectedMunicipalities.includes(loc.municipality)) return false;
        if (effectiveMin !== null) {
          const overVal = Number(loc.overOccupancy || 0);
          if (overVal < effectiveMin) return false;
        }
        if (minLicenseCount > 1 && Number(loc.licenseCount || 0) < minLicenseCount) return false;
        if (verifiedOnly && !loc.hasVerifiedLicense) return false;
        if (hasComplaintsOnly && !loc.hasComplaints) return false;
        if (searchTerm && !loc.searchText.includes(searchTerm)) return false;
        return true;
      });

      // Update listing source
      clearSpiderfy();
      map.getSource("strv").setData(toGeoJSON(filtered));

      // Update municipality counts based on filtered results
      updateMunicipalityCounts(filtered);

      // Update municipality visibility to only selected names
      const filterExpression = selectedMunicipalities.length > 0
        ? ["in", ["get", "NAME"], ["literal", selectedMunicipalities]]
        : ["==", ["get", "NAME"], "__NONE__"];

      if (map.getLayer("municipality-fill")) {
        map.setFilter("municipality-fill", filterExpression);
      }
      if (map.getLayer("municipality-outline")) {
        map.setFilter("municipality-outline", filterExpression);
      }
    }

    document.getElementById("complianceCheckbox").addEventListener("change", applyFilters);
    document.getElementById("verifiedLicenseCheckbox").addEventListener("change", applyFilters);
    document.getElementById("hasComplaintsCheckbox").addEventListener("change", applyFilters);
    document.getElementById("propertySearchInput").addEventListener("input", applyFilters);

    document.getElementById("overLimitSlider").addEventListener("input", (e) => {
      document.getElementById("overLimitValue").innerText = `${e.target.value} guests over`;
      applyFilters();
    });

    document.getElementById("licenseCountSlider").addEventListener("input", (e) => {
      const value = Number(e.target.value) || 1;
      document.getElementById("licenseCountValue").innerText = `${value} or more`;
      applyFilters();
    });

    // Reset Zoom: fit all listings into viewport
    document.getElementById("resetZoomBtn").addEventListener("click", () => {
      clearSpiderfy();
      map.fitBounds(
        [[globalMinX, globalMinY], [globalMaxX, globalMaxY]],
        { padding: 80, duration: 900, easing: t => t * (2 - t) }
      );
    });

    const mobileClose = document.getElementById('mobilePopupClose');
    if (mobileClose) {
      mobileClose.addEventListener('click', closeMobilePopup);
    }

    const mobileOverlay = document.getElementById('mobilePopupOverlay');
    if (mobileOverlay) {
      mobileOverlay.addEventListener('click', (event) => {
        if (event.target === mobileOverlay) {
          closeMobilePopup();
        }
      });
    }

    const toggleBtn = document.getElementById('toggleFiltersBtn');
    if (toggleBtn) {
      toggleBtn.addEventListener('click', () => {
        const panel = document.getElementById('filterPanel');
        if (!panel) return;
        const collapsed = panel.classList.toggle('collapsed');
        toggleBtn.textContent = collapsed ? 'Show' : 'Hide';
        if (!collapsed) {
          panel.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }
      });
    }

    loadComplaintIndex();
  </script>
</body>
</html>
