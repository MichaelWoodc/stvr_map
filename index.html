<!DOCTYPE html>
<html>
<head>
  <title>Chatham County STVR Compliance Map</title>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.css" rel="stylesheet" />

  <style>
    body {
      background-color: #1e1e1e;
      color: white;
      margin: 0;
      font-family: Arial, sans-serif;
    }
    h2 {
      padding: 10px;
      text-align: center;
      background-color: #222;
      margin: 0;
      color: #fff;
    }
    #map {
      height: calc(100vh - 44px);
      width: 100%;
    }

    .filter-panel {
      position: absolute;
      top: 10px;
      right: 10px;
      background: white;
      color: #333;
      padding: 12px;
      border-radius: 6px;
      box-shadow: 0 0 10px rgba(0,0,0,0.5);
      font-size: 14px;
      line-height: 1.5;
      z-index: 10;
    }

    .filter-title {
      font-weight: bold;
      margin-bottom: 6px;
      border-bottom: 1px solid #ccc;
      padding-bottom: 4px;
    }

    .filter-item {
      display: flex;
      align-items: center;
      cursor: pointer;
      font-weight: bold;
    }

    .filter-item input {
      margin-right: 8px;
      transform: scale(1.2);
      cursor: pointer;
    }

    .popup-title {
      font-size: 14px;
      font-weight: bold;
      color: #000;
      margin-bottom: 4px;
    }

    .popup-content {
      color: #000;
      font-size: 13px;
    }

    .warning-text {
      color: #d32f2f;
      font-weight: bold;
      background: #ffebee;
      padding: 4px 6px;
      border-radius: 4px;
      margin: 4px 0;
      display: inline-block;
    }

    .airbnb-link {
      display: block;
      margin-top: 10px;
      padding: 6px 12px;
      background-color: #ff5a5f;
      color: white !important;
      text-decoration: none !important;
      border-radius: 4px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

  <h2>Chatham County STVR Compliance Map</h2>
  <div id="map"></div>

  <div class="filter-panel">
    <div class="filter-title">Compliance Filters</div>
    <label class="filter-item">
      <input type="checkbox" id="complianceCheckbox">
      Show Violations Only
    </label>
  </div>

  <script src="https://unpkg.com/maplibre-gl@3.6.0/dist/maplibre-gl.js"></script>
  <script src="data_files/in_process_data/locations.js"></script>

  <script>
    // Precompute metrics
    const processedLocations = locations.map(loc => {
      const latitude = Number(loc.latitude);
      const longitude = Number(loc.longitude);
      const guests = Number(loc.guests) || 0;
      const bedrooms = Number(loc.bedrooms) || 0;

      if (!latitude || !longitude) return null;

      const baselineLimit = (bedrooms * 2) + 2;
      const maxAllowedGuests = bedrooms === 0 ? 2 : baselineLimit;
      const isOverCapacity = guests > maxAllowedGuests;
      const overAmount = isOverCapacity ? guests - maxAllowedGuests : 0;

      return {
        ...loc,
        latitude,
        longitude,
        guests,
        bedrooms,
        maxAllowedGuests,
        isOverCapacity,
        overAmount: Number(overAmount)
      };
    }).filter(Boolean);

    // Convert to GeoJSON
    function toGeoJSON(data) {
      return {
        type: "FeatureCollection",
        features: data.map(loc => ({
          type: "Feature",
          geometry: {
            type: "Point",
            coordinates: [loc.longitude, loc.latitude]
          },
          properties: loc
        }))
      };
    }

    const defaultCenter = [-81.0087, 32.0485];

    const map = new maplibregl.Map({
      container: "map",
      style: {
        version: 8,
        glyphs: "https://demotiles.maplibre.org/font/{fontstack}/{range}.pbf",
        sources: {
          "osm": {
            type: "raster",
            tiles: [
              "https://tile.openstreetmap.org/{z}/{x}/{y}.png"
            ],
            tileSize: 256
          }
        },
        layers: [
          {
            id: "osm",
            type: "raster",
            source: "osm"
          }
        ]
      },
      center: defaultCenter,
      zoom: 12
    });

    map.on("load", () => {

      // -----------------------------
      // GEOJSON SOURCE (CLUSTERING COMMENTED OUT)
      // -----------------------------
      map.addSource("strv", {
        type: "geojson",
        data: toGeoJSON(processedLocations),

        // cluster: true,
        // clusterRadius: 40,
        // clusterMaxZoom: 14
      });

      // -----------------------------
      // MAIN CIRCLE LAYER
      // -----------------------------
      map.addLayer({
        id: "strv-circles",
        type: "circle",
        source: "strv",
        paint: {
          "circle-radius": 12,
          "circle-color": [
            "case",
            ["get", "isOverCapacity"],
            "#d32f2f",
            "#388e3c"
          ],
          "circle-stroke-width": 2,
          "circle-stroke-color": "#fff"
        }
      });

      // -----------------------------
      // LABELS WITH COLLISION AVOIDANCE
      // -----------------------------
      map.addLayer({
        id: "strv-labels",
        type: "symbol",
        source: "strv",
        layout: {
          "text-field": [
            "case",
            ["get", "isOverCapacity"],
            ["to-string", ["get", "overAmount"]],
            ""
          ],
          "text-size": 12,
          "text-font": ["Open Sans Regular", "Arial Unicode MS Regular"],
          "text-anchor": "center",
          "text-justify": "center",

          // ⭐ AUTO COLLISION HANDLING
          "text-allow-overlap": false,
          "text-ignore-placement": false
        },
        paint: {
          "text-color": "#000",
          "text-halo-color": "#fff",
          "text-halo-width": 0.8
        }
      });

      // -----------------------------
      // POPUPS
      // -----------------------------
      map.on("click", "strv-circles", (e) => {
        const loc = e.features[0].properties;

        const excessive = loc.guests - loc.maxAllowedGuests;
        const warning = excessive > 0
          ? `<div class="warning-text">⚠️ OVER CAPACITY BY ${excessive} GUESTS</div>`
          : "";

        const html = `
          <div class="popup-content">
            <div class="popup-title">${loc.rental_type}</div>
            <strong>Approximate Address:</strong> ${loc.approximate_address}<br/>
            <strong>Host:</strong> ${loc.host_name}<hr/>

            <strong>Advertised Capacity:</strong> ${loc.guests}<br/>
            <strong>Bedrooms:</strong> ${loc.bedrooms}<br/>
            <strong>Legal Limit:</strong> ${loc.maxAllowedGuests}<br/>
            ${warning}

            <a class="airbnb-link" href="${loc.url}" target="_blank">View Listing</a>
          </div>
        `;

        new maplibregl.Popup()
          .setLngLat(e.lngLat)
          .setHTML(html)
          .addTo(map);
      });

      // -----------------------------
      // ⭐ ZOOM TO POINT ON CLICK (works even without clustering)
      // -----------------------------
      map.on("click", "strv-circles", (e) => {
        const coords = e.features[0].geometry.coordinates;

        map.easeTo({
          center: coords,
          zoom: Math.max(map.getZoom(), 15)
        });
      });

    });

    // -----------------------------
    // FILTER HANDLER
    // -----------------------------
    document.getElementById("complianceCheckbox").addEventListener("change", (e) => {
      const filtered = e.target.checked
        ? processedLocations.filter(loc => loc.isOverCapacity)
        : processedLocations;

      map.getSource("strv").setData(toGeoJSON(filtered));
    });
  </script>
</body>
</html>
